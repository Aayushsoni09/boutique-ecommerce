apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: 381491835701.dkr.ecr.ap-south-1.amazonaws.com/order-service:62661bab5c37b15684b37692a558baf463907c00
        ports:
        - containerPort: 3006
        env:
        - name: NODE_ENV
          value: development
        - name: PORT
          value: "3006"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: boutique-secrets
              key: USERS_DB_URL
---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: boutique
spec:
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 3006
    targetPort: 3006
  type: ClusterIP
